# Auto-loaded by `docker compose` alongside docker-compose.yml for local dev.
# Keeps the base file prod-like; this file only adds hot-reload conveniences.
services:
  backend:
    volumes:
      - ./backend/src:/app/src
    environment:
      ENVIRONMENT: development
    command:
      [
        "uvicorn",
        "orchestrator.api.main:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  # frontend dev conveniences: source bind mount for Vite HMR. The `dev`
  # target's CMD already runs `vite --host 0.0.0.0`, so no command override
  # is needed here (unlike backend, whose runtime CMD has no --reload).
  frontend:
    volumes:
      - ./frontend/src:/app/src
