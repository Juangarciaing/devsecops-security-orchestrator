# Auto-loaded by `docker compose` alongside docker-compose.yml for local dev.
# Keeps the base file prod-like; this file only adds hot-reload conveniences.
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    volumes:
      - ./backend/src:/app/src
    environment:
      ENVIRONMENT: development
    command:
      [
        "uvicorn",
        "orchestrator.api.main:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  # frontend dev conveniences: source bind mount for Vite HMR. The `dev`
  # target's CMD already runs `vite --host 0.0.0.0`, so no command override
  # is needed here (unlike backend, whose runtime CMD has no --reload).
  frontend:
    volumes:
      - ./frontend/src:/app/src

  # Flower: web UI for the `scan` queue (spec: "Worker starts and binds to
  # the scan queue ... Flower is reachable and shows the scan queue"). Dev
  # convenience only — not part of the prod-like base compose file.
  flower:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: ["celery", "-A", "orchestrator.workers.celery_app", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
