# Auto-loaded by `docker compose` alongside docker-compose.yml for local dev.
# Keeps the base file prod-like; this file only adds hot-reload conveniences.
services:
  backend:
    volumes:
      - ./backend/src:/app/src
    environment:
      ENVIRONMENT: development
    command:
      [
        "uvicorn",
        "orchestrator.api.main:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  # frontend dev conveniences (Vite HMR, source bind mount, exposed dev port)
  # are added by PR3 alongside the frontend service itself — see the note in
  # docker-compose.yml.
