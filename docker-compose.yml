services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator} -d ${POSTGRES_DB:-orchestrator}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Module 13a — off by default (empty ⇒ zero exporter, zero behavior
      # change). Opt in by setting this in `.env` to the `jaeger` service's
      # OTLP-gRPC address (`http://jaeger:4317`).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Module 13a — same off-by-default opt-in as `backend` above; the
      # worker's TracerProvider/exporter is initialized per forked child
      # process via a `worker_process_init` handler (fork-safety, D2).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    command: ["celery", "-A", "orchestrator.workers.celery_app", "worker", "-Q", "scan", "-l", "info"]
    # Module 6: the worker orchestrates SIBLING scanner/init containers via
    # the `docker` Python SDK — it is the ONLY service that gets the Docker
    # socket (`backend`, the API server, has no business launching
    # containers). Holding this socket is root-equivalent to the HOST
    # (design's accepted residual risk R1: durable fix = Module 13's
    # k8s Jobs + gVisor/Kata, no socket). R1 is scoped to socket access
    # itself, NOT to the worker's own process UID — running the Celery
    # process as root would needlessly widen the blast radius of any
    # UNRELATED vulnerability in worker/dependency code. The image's
    # non-root `appuser` (uid 1000, set via `USER appuser` in
    # `docker/backend.Dockerfile`) is kept as-is; `group_add` grants that
    # user supplementary access to the host's docker.sock group instead.
    # `DOCKER_GID` is host-specific (varies by distro/CI/Docker Desktop vs
    # Engine) — set it in `.env` to your host's actual GID, found via:
    #   stat -c '%g' /var/run/docker.sock   (Linux)
    #   ls -la /var/run/docker.sock         (macOS, read the group column)
    # 999 is a common default on many Debian/Ubuntu hosts but is NOT
    # guaranteed — always verify against your own host.
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  jaeger:
    # Module 13a — self-hosted OTLP trace collector + UI. Always present in
    # the stack (harmless when unused); the `backend`/`worker` services'
    # OTEL_EXPORTER_OTLP_ENDPOINT default is empty, so a fresh `docker
    # compose up` with no `.env` opt-in exhibits zero tracing behavior even
    # though this service is running. Digest confirmed at apply time via
    # `docker buildx imagetools inspect jaegertracing/all-in-one:1.62.0`.
    image: "jaegertracing/all-in-one:1.62.0@sha256:836e9b69c88afbedf7683ea7162e179de63b1f981662e83f5ebb68badadc710f"
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC receiver

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5173",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
