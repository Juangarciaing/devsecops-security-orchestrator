# Scaffolded for the (currently unused) `prod` build stage of
# docker/frontend.Dockerfile. Listens on 8080 (non-root cannot bind <1024)
# and falls back to index.html for client-side routing.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
